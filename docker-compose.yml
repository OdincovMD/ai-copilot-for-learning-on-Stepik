services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      MAX_CURRENT_STEP_MARKDOWN_CHARS: ${MAX_CURRENT_STEP_MARKDOWN_CHARS}
      MAX_PREVIOUS_STEPS: ${MAX_PREVIOUS_STEPS}
      MAX_PREVIOUS_STEP_MARKDOWN_CHARS: ${MAX_PREVIOUS_STEP_MARKDOWN_CHARS}
      MAX_COMMENTS: ${MAX_COMMENTS}
      MAX_COMMENT_CHARS: ${MAX_COMMENT_CHARS}
      MAX_TOTAL_REQUEST_CHARS: ${MAX_TOTAL_REQUEST_CHARS}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
